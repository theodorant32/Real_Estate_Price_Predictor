[phases.setup]
nixPkgs = ["python310"]

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    "export PATH=/opt/venv/bin:$PATH",
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "streamlit run app.py --server.headless true --server.port $PORT --server.address 0.0.0.0"
