# Daily Data Refresh
# Runs every day at 3 AM UTC to fetch latest prices and rates
# Keeps data fresh without full retraining

name: Daily Data Refresh

on:
  schedule:
    # Every day at 3:00 AM UTC
    - cron: '0 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch fresh data
      run: |
        python src/ingest.py
        python src/scrapers.py
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Regenerate features
      run: |
        python src/features.py
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Commit updated data
      uses: stefanzweifel/git-auto-commit-action@v5
      if: success()
      with:
        commit_message: '[ci] Daily data refresh - $(date +%Y-%m-%d)'
        file_pattern: 'data/raw/*.csv data/processed/*.csv src/rates.py'
