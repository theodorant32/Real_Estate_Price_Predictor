# Daily Data Refresh
# Runs every day at 3 AM UTC to fetch latest prices and rates
# Keeps data fresh without full retraining
# Gracefully falls back to cached data if scraping fails

name: Daily Data Refresh

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch fresh data (with fallback)
      run: |
        python src/ingest.py || echo "Ingest completed with fallback data"
      env:
        PYTHONPATH: ${{ github.workspace }}
        SELENIUM_HEADLESS: true

    - name: Commit updated data if changed
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: '[ci] Daily data refresh - $(date +%Y-%m-%d)'
        file_pattern: 'data/raw/*.csv data/processed/*.csv'
        skip_fetch: true
